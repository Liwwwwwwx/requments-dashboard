name: Backend CI/CD

on:
  push:
    branches: [main, dev]
    paths:
      - 'backend/**'
      - 'package*.json'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main, dev]
    paths:
      - 'backend/**'
      - 'package*.json'
      - '.github/workflows/backend.yml'
  workflow_dispatch:

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

env:
  DEPLOY_USER: ubuntu
  DEPLOY_PATH: /home/ubuntu/requments-dashboard
  PM2_PATH: /home/ubuntu/.npm-global/bin

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: traceboard_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        options: >-
          --health-cmd "pg_isready -U postgres -d traceboard_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/traceboard_test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Backend smoke test (zod schema)
        run: npm run test:schema

      - name: Run PostgreSQL migrations
        run: node backend/scripts/db-migrate.js

      - name: Backend tests
        run: npm run test:backend

  deploy:
    name: Deploy backend
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Add server host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Pull source and refresh dependencies when needed
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 5m
          script: |
            set -e
            export PATH="${{ env.PM2_PATH }}:$PATH"
            flock /tmp/req-board-deploy.lock bash -lc '
              set -e
              cd "${{ env.DEPLOY_PATH }}"
              before="$(git rev-parse HEAD)"
              git pull --ff-only
              after="$(git rev-parse HEAD)"
              deps_changed=0
              if [ "$before" != "$after" ] && git diff --name-only "$before" "$after" -- package.json package-lock.json frontend/package.json backend/package.json | grep -q .; then
                deps_changed=1
              fi
              if [ ! -d node_modules ] || [ ! -x node_modules/.bin/next ] || [ ! -x node_modules/.bin/tsc ]; then
                deps_changed=1
              fi
              if [ "$deps_changed" = "1" ]; then
                npm ci --no-audit --no-fund --loglevel=error
              else
                echo "Dependencies unchanged; skipping npm ci"
              fi
            '

      - name: Restart backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 1m
          script: |
            set -e
            export PATH="${{ env.PM2_PATH }}:$PATH"
            flock /tmp/req-board-deploy.lock bash -lc '
              set -e
              export PATH="${{ env.PM2_PATH }}:$PATH"
              cd "${{ env.DEPLOY_PATH }}"
              pm2 startOrReload ecosystem.config.cjs --only req-board-backend --update-env
              pm2 save
              pm2 ls --no-color
            '

      - name: Backend smoke test
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30s
          script: |
            set -e
            sleep 3
            curl -fsS http://127.0.0.1:4315/api/health && echo " (backend)"
