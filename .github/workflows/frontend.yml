name: Frontend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'package*.json'
      - '.github/workflows/frontend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'package*.json'
      - '.github/workflows/frontend.yml'

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

env:
  DEPLOY_USER: ubuntu
  DEPLOY_PATH: /home/ubuntu/requments-dashboard
  PM2_PATH: /home/ubuntu/.npm-global/bin

jobs:
  test:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Frontend typecheck
        run: npm run typecheck

      - name: Frontend lint
        run: npm run lint

      - name: Frontend tests
        run: npm run test:frontend

      - name: Frontend build
        run: npm run build

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/.next/
          include-hidden-files: true
          retention-days: 1

  deploy:
    name: Deploy frontend
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Download frontend build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/.next/

      - name: Install rsync and add host key
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq rsync
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Save deploy key
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Prepare server checkout and refresh dependencies when needed
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 5m
          script: |
            set -e
            export PATH="${{ env.PM2_PATH }}:$PATH"
            flock /tmp/req-board-deploy.lock bash -lc '
              set -e
              cd "${{ env.DEPLOY_PATH }}"
              before="$(git rev-parse HEAD)"
              git pull --ff-only
              after="$(git rev-parse HEAD)"
              deps_changed=0
              if [ "$before" != "$after" ] && git diff --name-only "$before" "$after" -- package.json package-lock.json frontend/package.json backend/package.json | grep -q .; then
                deps_changed=1
              fi
              if [ ! -d node_modules ] || [ ! -x node_modules/.bin/next ] || [ ! -x node_modules/.bin/tsc ]; then
                deps_changed=1
              fi
              if [ "$deps_changed" = "1" ]; then
                npm ci --no-audit --no-fund --loglevel=error
              else
                echo "Dependencies unchanged; skipping npm ci"
              fi
            '

      - name: Sync frontend build to server
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            frontend/.next/ \
            ${{ env.DEPLOY_USER }}@${{ secrets.SSH_HOST }}:${{ env.DEPLOY_PATH }}/frontend/.next/

      - name: Restart frontend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 1m
          script: |
            set -e
            export PATH="${{ env.PM2_PATH }}:$PATH"
            flock /tmp/req-board-deploy.lock bash -lc '
              set -e
              export PATH="${{ env.PM2_PATH }}:$PATH"
              cd "${{ env.DEPLOY_PATH }}"
              pm2 restart req-board-frontend --update-env || pm2 start ecosystem.config.cjs --only req-board-frontend
              pm2 save
              pm2 ls --no-color
            '

      - name: Frontend smoke test
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30s
          script: |
            set -e
            sleep 3
            curl -fsSL -o /dev/null -w "%{http_code}" http://127.0.0.1:5173/ && echo " (frontend)"
