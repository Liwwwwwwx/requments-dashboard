name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Backend smoke test (zod schema)
        run: npm run test:schema

      - name: Backend tests
        run: npm run test:backend

      - name: Frontend typecheck
        run: npm run typecheck --workspace=frontend

      - name: Frontend lint
        run: npm run lint --workspace=frontend

      - name: Frontend tests
        run: npm run test:frontend

      - name: Frontend build
        run: npm run build --workspace=frontend

      - name: Upload backend coverage
        if: matrix.node-version == '22.x'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-backend
          path: backend/coverage/
          retention-days: 7

      - name: Upload frontend coverage
        if: matrix.node-version == '22.x'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-frontend
          path: frontend/coverage/
          retention-days: 7

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 10
    environment:
      url: http://81.70.201.94:5173

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build --workspace=frontend

      - name: Pull latest source on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/requments-dashboard
            git pull
            npm install --prefer-offline --no-audit --no-fund --loglevel=error

      - name: Ship .next/ build artifact
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "frontend/.next"
          target: /home/ubuntu/requments-dashboard/frontend/
          strip_components: 0
          rm: true

      - name: Restart services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            pm2 restart req-board-backend || pm2 start ecosystem.config.cjs --only req-board-backend
            pm2 restart req-board-frontend || pm2 start ecosystem.config.cjs --only req-board-frontend
            pm2 save

      - name: Smoke test
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sleep 3
            curl -sf http://127.0.0.1:4315/api/health && echo " ✓ backend"
            curl -sf -o /dev/null -w "%{http_code}\n" http://127.0.0.1:5173/ && echo " ✓ frontend"